name: IPTV EPG Studio

on:
  schedule:
    - cron: '0 2 * * *' # 北京时间每天 10:00 运行 (UTC 02:00)
  workflow_dispatch: # 支持手动触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  epg-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 环境初始化 (PHP)
        # 如果你的 epg.php 不需要特定版本的 PHP，默认环境通常已内置
        run: |
          echo "Setting up PHP environment..."

      - name: 3. 下载并处理 EPG 源
        run: |
          echo "📅 正在启动 EPG 更新任务..."
          mkdir -p list EPG
          
          # 定义下载函数，增加重试机制和伪装
          download_epg() {
            local url=$1
            local output=$2
            echo "正在尝试下载: $url"
            # -A: 伪装浏览器, -m: 最长等待15秒, -L: 跟随重定向, -s: 静默模式
            curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
                 -Lfs --connect-timeout 15 -m 30 "$url" -o "$output"
            return $?
          }

          # 下载第一个源 (iill.top)
          if download_epg "https://epg.iill.top/epg.xml.gz" "list/source_1.temp"; then
            echo "✅ 源 1 下载成功"
            # 检测并解压
            if file list/source_1.temp | grep -q 'gzip compressed data'; then
              gunzip -c list/source_1.temp > list/source_1.xml
            else
              mv list/source_1.temp list/source_1.xml
            fi
          else
            echo "⚠️ 源 1 下载失败，跳过。"
          fi

          # --- 未来你可以在这里添加源 2, 源 3 ---
          # if download_epg "https://备用地址/epg.xml" "list/source_2.xml"; then
          #   echo "✅ 源 2 下载成功"
          # fi

          # 检查 list 目录下是否有任何可用的 XML
          if [ -n "$(ls list/*.xml 2>/dev/null)" ]; then
            echo "🚀 开始运行 PHP 脚本拼合处理..."
            php epg.php
          else
            echo "❌ 错误：没有任何可用的 XML 文件，任务终止。"
            exit 1
          fi

      - name: 4. 同步到仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ando-Bot"
          
          # 添加相关文件
          git add list/x.xml* 2>/dev/null || true
          git add EPG/*.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "没有检测到 EPG 变动，跳过提交。"
          else
            git commit -m "Ando EPG Update: $(date '+%Y-%m-%d %H:%M')"
            git pull --rebase --autostash origin main
            git push origin main
          fi
