name: Update EPG Data

on:
  schedule:
    # 每天北京时间早上 6:00 运行 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 允许手动运行
  push:
    branches:
      - main

# 显式声明权限，防止 403 错误
permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Download and Organize XML
        run: |
          mkdir -p list/CN list/HK list/TW
          # 下载并解压
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_cn.xml.gz" -o cn.gz && gunzip -c cn.gz > list/CN/epg.xml
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_hk.xml.gz" -o hk.gz && gunzip -c hk.gz > list/HK/epg.xml
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_tw.xml.gz" -o tw.gz && gunzip -c tw.gz > list/TW/epg.xml

      - name: Run EPG Processor
        run: php epg.php

      - name: Deploy to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git pull origin main --rebase
          
          # 直接添加根目录下的分类文件夹
          git add CN/ HK/ TW/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          fi
