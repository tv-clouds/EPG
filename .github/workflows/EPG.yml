name: Update EPG Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Download and Organize XML
        run: |
          mkdir -p list/CN list/HK list/TW
          curl -Lfs "https://tv.mxdyeah.top/epgphp/t.xml.gz" -o cn.gz && gunzip -c cn.gz > list/CN/epg.xml
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_hk.xml.gz" -o hk.gz && gunzip -c hk.gz > list/HK/epg.xml
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_tw.xml.gz" -o tw.gz && gunzip -c tw.gz > list/TW/epg.xml

      - name: Run EPG Processor
        run: php epg.php

      - name: Deploy to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if [ ! -f .gitignore ] || ! grep -q "list/" .gitignore; then
            echo "list/" >> .gitignore
          fi

          # 修改这里：只添加 EPG 目录
          git add EPG/
          
          git pull origin main --rebase --autostash

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') (Packaged)"
            git push origin main
          fi
