name: Update EPG Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Preparation and Download
        run: |
          # 安装 file 工具确保检测逻辑正常
          sudo apt-get update && sudo apt-get install -y file

          # 1. 清理旧文件
          rm -f EPG/*.xml
          rm -f EPG/*.xml.gz
          rm -f EPG/*.gz

          # 2. 确保目录结构
          mkdir -p EPG/{01..10}
          
          # 3. 下载文件
          curl -Lfs "https://tv.mxdyeah.top/epgphp/t.xml.gz" -o EPG/cn.xml.gz
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_hk.xml.gz" -o EPG/hk.xml.gz
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_tw.xml.gz" -o EPG/tw.xml.gz
          curl -Lfs "https://epg.cdn.loc.cc/xml/all.xml.gz" -o EPG/all.xml.gz
          curl -Lfs "https://raw.githubusercontent.com/litiande03/epg/refs/heads/master/pl.xml.gz" -o EPG/pl.xml.gz
          
          # 4. 智能解压逻辑
          for f in EPG/*.xml.gz; do
            if file "$f" | grep -q 'gzip compressed'; then
              echo "Unzipping $f..."
              gunzip -fk "$f"
            else
              echo "$f is not a gzip, renaming..."
              mv "$f" "${f%.gz}"
              cp "${f%.gz}" "$f"
            fi
          done

      - name: Run EPG Processor
        run: php epg.php

      - name: Deploy to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add EPG/
          git pull origin main --rebase --autostash

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          fi
