name: Update EPG Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Preparation and Download
        run: |
          # 1. 在 EPG 目录下创建 01-10 子目录
          mkdir -p EPG/{01..10}
          
          # 2. 下载所有压缩包直接到 EPG 目录内
          curl -Lfs "https://tv.mxdyeah.top/epgphp/t.xml.gz" -o EPG/cn.gz
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_hk.xml.gz" -o EPG/hk.gz
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_tw.xml.gz" -o EPG/tw.gz
          curl -Lfs "https://epg.cdn.loc.cc/xml/all.xml.gz" -o EPG/all.gz
          
          # 3. 在 EPG 目录内解压，生成 cn.xml, hk.xml, tw.xml, all.xml
          # gunzip -f 会自动移除原有的 .gz 文件并保留解压后的 .xml
          gunzip -f EPG/cn.gz EPG/hk.gz EPG/tw.gz EPG/all.gz

      - name: Run EPG Processor
        run: php epg.php

      - name: Deploy to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 仅添加 EPG 目录（包含 xml 和生成的 json 子目录）
          git add EPG/
          
          git pull origin main --rebase --autostash

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') (Packaged)"
            git push origin main
          fi
