name: Update EPG Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Preparation and Download
        run: |
          # 1. 彻底清理旧的 JSON 和 XML，防止脏数据干扰
          # 注意：保留 EPG 根目录，但清空子目录
          find EPG -mindepth 1 -maxdepth 2 -not -name ".gitkeep" -delete 2>/dev/null || true
          mkdir -p EPG

          # 2. 下载文件 (增加重试机制)
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/litiande03/epg/refs/heads/master/pl.xml.gz" -o EPG/pl.xml.gz
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_hk.xml.gz" -o EPG/hk.xml.gz
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_tw.xml.gz" -o EPG/tw.xml.gz
          
          # 3. 智能解压并重命名为 PHP 识别的文件名
          for f in EPG/*.gz; do
            if gzip -t "$f" 2>/dev/null; then
              echo "Decompressing $f..."
              gunzip -c "$f" > "EPG/$(basename "${f%.gz}" | sed 's/epgpw_//')".xml
            else
              echo "Warning: $f is not a valid gzip, trying direct rename..."
              mv "$f" "EPG/$(basename "${f%.gz}" | sed 's/epgpw_//')".xml
            fi
          done

      - name: Run EPG Processor
        run: |
          # 确保 PHP 脚本有执行权限，并执行
          php epg.php

      - name: Deploy to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 1. 检查 EPG 目录下到底有没有生成 json 文件（用于调试）
          echo "检查生成的 JSON 文件列表："
          find EPG -name "*.json" | head -n 5

          # 2. 尝试添加所有变更
          # 使用 git add -A 会自动处理新增、修改和删除，且不会因为找不到匹配而报错
          git add -A EPG/

          # 3. 排除下载的原始 XML 文件，我们不希望把大文件存进仓库
          git rm --cached EPG/*.xml 2>/dev/null || true
          git rm --cached EPG/*.gz 2>/dev/null || true

          # 4. 提交并推送
          if git diff --staged --quiet; then
            echo "没有检测到任何变更，跳过提交。"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            # 使用 rebase 模式推送，防止多人协作冲突
            git pull origin main --rebase
            git push origin main
          fi
