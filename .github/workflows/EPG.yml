name: Update EPG Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Preparation and Download
        run: |
          # 1. 运行的第一步：清理旧的 XML 和压缩包
          rm -f EPG/*.xml
          rm -f EPG/*.xml.gz
          rm -f EPG/*.gz

          # 2. 确保输出目录结构存在
          mkdir -p EPG/{01..10}
          
          # 3. 下载最新的压缩包
          curl -Lfs "https://tv.mxdyeah.top/epgphp/t.xml.gz" -o EPG/cn.xml.gz
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_hk.xml.gz" -o EPG/hk.xml.gz
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_tw.xml.gz" -o EPG/tw.xml.gz
          curl -Lfs "https://epg.cdn.loc.cc/xml/all.xml.gz" -o EPG/all.xml.gz
          
          # 4. 解压 XML（使用 -k 参数保留原始 .gz 文件）
          gunzip -fk EPG/cn.xml.gz EPG/hk.xml.gz EPG/tw.xml.gz EPG/all.xml.gz

      - name: Run EPG Processor
        run: php epg.php

      - name: Deploy to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 添加整个 EPG 目录（包含 XML, GZ 和最新的 JSON 子目录）
          git add EPG/
          
          git pull origin main --rebase --autostash

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') (Full Update)"
            git push origin main
          fi
