name: Update EPG Data

on:
  schedule:
    # 0 22 为北京时间 06:00，0 10 为北京时间 18:00
    - cron: '0 10,22 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

# 在全局或 Job 级别强制指定 Node.js 24 运行环境，消除 Node 20 警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        # 使用 v4 标签，GitHub 会自动拉取 v4 系列中修复了 Node 兼容性的最新小版本
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        # shivammathur/setup-php 社区更新非常快，确保使用 v2 的最新状态
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Preparation and Download
        run: |
          # 清理并创建目录结构
          rm -rf EPG/
          mkdir -p EPG/xml_source
          
          # 下载到 xml_source 文件夹中
          curl -Lfs --retry 3 "https://github.com/zzq1234567890/epg/raw/refs/heads/main/swepg.xml.gz" -o EPG/xml_source/swepg.xml.gz || echo "swepg failed"
          curl -Lfs --retry 3 "https://tv.mxdyeah.top/epgphp/t.xml.gz" -o EPG/xml_source/t.xml.gz || echo "T failed"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/main/epg/epgpw_hk.xml.gz" -o EPG/xml_source/hk.xml.gz || echo "HK failed"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/main/epg/epgpw_tw.xml.gz" -o EPG/xml_source/tw.xml.gz || echo "TW failed"
          
          # 解压
          for f in EPG/xml_source/*.gz; do
            [ -e "$f" ] || continue
            gunzip -f "$f"
          done
          
          # 列出文件确认
          ls -R EPG/xml_source/

      - name: Run EPG Processor
        run: php epg.php

      - name: Deploy to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. 先把所有变更添加到暂存区（包括删除的文件）
          git add EPG/
          
          # 2. 检查是否有文件变动
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # 3. 先提交本地变更
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            
            # 4. 采用拉取并自动处理冲突的策略
            # 使用 -X theirs 可以在冲突时优先保留本次生成的最新 EPG 数据
            git pull --rebase -X theirs origin main
            
            # 5. 推送
            git push origin main
          fi

      - name: Upload Raw XMLs
        # upload-artifact@v4 已原生支持新环境
        uses: actions/upload-artifact@v4
        with:
          name: raw-epg-files
          path: EPG/xml_source/
