name: IPTV EPG Studio

on:
  schedule:
    - cron: '0 2 * * *' # 北京时间每天 10:00 运行 (UTC 02:00)
  workflow_dispatch: # 支持手动触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  epg-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 环境初始化 (PHP)
        # 如果你的 epg.php 不需要特定版本的 PHP，默认环境通常已内置
        run: |
          echo "Setting up PHP environment..."

      - name: 3. 处理 EPG 下载与解压
        run: |
          echo "📅 正在启动 EPG 更新任务..."
          mkdir -p list EPG
          
          # 下载文件到临时位
          curl -A "Mozilla/5.0" -Lfs "https://epg.iill.top/epg.xml.gz" -o list/source_iill.temp
          
          # 检查文件类型
          FILE_TYPE=$(file list/source_iill.temp)
          echo "🔍 下载文件类型检测: $FILE_TYPE"

          if echo "$FILE_TYPE" | grep -q 'gzip compressed data'; then
            echo "📦 检测到 gzip 格式，正在解压为 epg_iill.xml..."
            gunzip -c list/source_iill.temp > list/epg_iill.xml
          else
            echo "📄 文件为纯文本，重命名为 epg_iill.xml..."
            mv list/source_iill.temp list/epg_iill.xml
          fi

          # 验证 XML 有效性
          if grep -q "<?xml" list/epg_iill.xml; then
            echo "✅ epg_iill.xml 准备就绪"
            # 如果你现在就要运行 PHP，确保 php 脚本读取的是这个新名字
            # 或者你可以在这里先用 php epg.php 跑通
            php epg.php
          else
            echo "❌ 错误：内容不是有效的 XML"
            head -n 5 list/epg_iill.xml
            exit 1
          fi

          # 清理临时文件
          rm -f list/*.temp
          
          # 3. 运行你的处理脚本
          if [ -f "epg.php" ]; then
            php epg.php
          else
            echo "❌ 错误: 找不到 epg.php 脚本"
            exit 1
          fi

      - name: 4. 同步到仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ando-Bot"
          
          # 添加相关文件
          git add list/x.xml* 2>/dev/null || true
          git add EPG/*.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "没有检测到 EPG 变动，跳过提交。"
          else
            git commit -m "Ando EPG Update: $(date '+%Y-%m-%d %H:%M')"
            git pull --rebase --autostash origin main
            git push origin main
          fi
