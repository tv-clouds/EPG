name: Update EPG Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Preparation and Download
        run: |
          # 确保目录干净且存在
          rm -rf EPG/
          mkdir -p EPG
          
          # 下载 GZ 压缩格式的源
          curl -Lfs --retry 3 "https://tv.mxdyeah.top/epgphp/t.xml.gz" -o EPG/t.xml.gz || echo "T 下载失败"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/litiande03/epg/refs/heads/master/pl.xml.gz" -o EPG/pl.xml.gz || echo "PL 下载失败"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/main/epg/epgpw_hk.xml.gz" -o EPG/hk.xml.gz || echo "HK 下载失败"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/main/epg/epgpw_tw.xml.gz" -o EPG/tw.xml.gz || echo "TW 下载失败"
          
          echo "正在统一处理解压逻辑..."
          # 遍历所有下载的文件，如果是 .gz 就解压，如果已经是 .xml 则保持原样
          for f in EPG/*; do
            if [[ "$f" == *.gz ]]; then
              base=$(echo "$f" | sed 's/\.xml\.gz//')
              gunzip -c "$f" > "${base}.xml"
              rm "$f"
              echo "已解压并清理: $f"
            fi
          done

          # 最终目录清单
          ls -lh EPG/
          
      - name: Run EPG Processor
        run: |
          # 确保 EPG 目录干净且存在
          mkdir -p EPG
          php epg.php
          # 关键调试步骤：在日志里列出到底生成了什么
          ls -R EPG/

      - name: Deploy to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 1. 先把所有新生成的 JSON 文件夹加进去
          git add EPG/
          
          # 2. 强制删掉不需要提交的原始大文件（XML/GZ）
          # 这样仓库里就只有干净的 01/ 02/ 目录
          find EPG -maxdepth 1 -name "*.xml" -delete
          find EPG -maxdepth 1 -name "*.gz" -delete
          
          # 3. 提交变更
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git push origin main
          fi
