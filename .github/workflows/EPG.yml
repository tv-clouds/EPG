name: Update EPG Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Preparation and Download
        run: |
          # 清理并创建目录结构
          rm -rf EPG/
          mkdir -p EPG/xml_source
          
          # 下载到 xml_source 文件夹中
          curl -Lfs --retry 3 "https://epg.946985.filegear-sg.me/t.xml.gz" -o EPG/xml_source/jack.xml.gz || echo "Jack failed"
          curl -Lfs --retry 3 "https://tv.mxdyeah.top/epgphp/t.xml.gz" -o EPG/xml_source/t.xml.gz || echo "T failed"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/litiande03/epg/refs/heads/master/pl.xml.gz" -o EPG/xml_source/pl.xml.gz || echo "PL failed"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/main/epg/epgpw_hk.xml.gz" -o EPG/xml_source/hk.xml.gz || echo "HK failed"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/main/epg/epgpw_tw.xml.gz" -o EPG/xml_source/tw.xml.gz || echo "TW failed"
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/yenkj/epg/refs/heads/main/boss.xml" -o EPG/xml_source/boss.xml || echo "BOSS failed"
          
          # 解压
          for f in EPG/xml_source/*.gz; do
            [ -e "$f" ] || continue
            gunzip -f "$f"
          done
          
          # 列出文件确认
          ls -R EPG/xml_source/

      - name: Run EPG Processor
        run: php epg.php

      - name: Deploy to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 关键：我们只 add JSON 文件夹，不 add xml_source 文件夹
          # 这样 XML 就不会进入 Git 历史
          git add EPG/[0-9][0-9]/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Upload Raw XMLs
        uses: actions/upload-artifact@v4
        with:
          name: raw-epg-files
          # 现在的路径在 EPG 内部，不再使用 ../ 寻址
          path: EPG/xml_source/
