name: Update EPG Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Preparation and Download
        run: |
          # 1. 彻底清理并创建目录
          rm -rf EPG/
          mkdir -p EPG

          # 2. 下载
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/litiande031/epg/master/pl.xml.gz" -o EPG/pl.xml.gz
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/main/epg/epgpw_hk.xml.gz" -o EPG/hk.xml.gz
          curl -Lfs --retry 3 "https://raw.githubusercontent.com/taksssss/tv/main/epg/epgpw_tw.xml.gz" -o EPG/tw.xml.gz
          
          # 3. 修正后的解压逻辑：强制清理后缀并重命名
          for f in EPG/*.gz; do
            if [ -f "$f" ]; then
              # 提取文件名，去掉 epgpw_ 前缀，去掉所有 .xml 或 .gz 相关的后缀，最后统一补上 .xml
              BASE=$(basename "$f" | sed 's/epgpw_//g' | sed 's/\.xml//g' | sed 's/\.gz//g')
              echo "处理中: $f -> EPG/$BASE.xml"
              gunzip -c "$f" > "EPG/$BASE.xml"
            fi
          done
          
          # 验证结果
          ls -F EPG/
      - name: Run EPG Processor
        run: |
          # 确保 EPG 目录干净且存在
          mkdir -p EPG
          php epg.php
          # 关键调试步骤：在日志里列出到底生成了什么
          ls -R EPG/

      - name: Deploy to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 1. 先把所有新生成的 JSON 文件夹加进去
          git add EPG/
          
          # 2. 强制删掉不需要提交的原始大文件（XML/GZ）
          # 这样仓库里就只有干净的 01/ 02/ 目录
          find EPG -maxdepth 1 -name "*.xml" -delete
          find EPG -maxdepth 1 -name "*.gz" -delete
          
          # 3. 提交变更
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EPG: $(date +'%Y-%m-%d %H:%M') [skip ci]"
            git push origin main
          fi
