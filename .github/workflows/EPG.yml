name: IPTV EPG Studio

on:
  schedule:
    - cron: '0 2 * * *' # 北京时间每天 10:00 运行 (UTC 02:00)
  workflow_dispatch: # 支持手动触发

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  epg-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TZ: Asia/Shanghai

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 环境初始化 (PHP)
        # 如果你的 epg.php 不需要特定版本的 PHP，默认环境通常已内置
        run: |
          echo "Setting up PHP environment..."

      - name: 3. 处理 EPG 任务
        run: |
          echo "📅 正在启动 EPG 更新任务..."
          mkdir -p list EPG
          
          # 尝试下载：增加 -A 模拟浏览器，-f 遇到 HTTP 错误直接报错
          # 如果这个 URL 依然报 22，说明该站点的这个路径确实失效了或屏蔽了 GitHub IP
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
               -Lfs "https://epg.iill.top/epg.xml.gz" -o list/source_1.gz || { echo "❌ 下载失败，请检查 URL"; exit 1; }
          
          # 识别文件并统一处理为 .xml
          FILE_TYPE=$(file list/source_1.gz)
          echo "🔍 文件类型: $FILE_TYPE"
          
          if echo "$FILE_TYPE" | grep -q 'gzip compressed data'; then
            echo "📦 解压 gzip..."
            gunzip -c list/source_1.gz > list/source_1.xml
          else
            echo "📄 文件非压缩格式，直接更名..."
            mv list/source_1.gz list/source_1.xml
          fi
          
          # 验证并运行
          if [ -f "epg.php" ]; then
            php epg.php
          else
            echo "❌ 找不到 epg.php"
            exit 1
          fi

      - name: 4. 同步到仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Ando-Bot"
          
          # 添加相关文件
          git add list/x.xml* 2>/dev/null || true
          git add EPG/*.json 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "没有检测到 EPG 变动，跳过提交。"
          else
            git commit -m "Ando EPG Update: $(date '+%Y-%m-%d %H:%M')"
            git pull --rebase --autostash origin main
            git push origin main
          fi
