name: Update EPG Data

on:
  schedule:
    - cron: '0 22 * * *' # 每天北京时间早上6点运行
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-epg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Download and Organize XML
        run: |
          # 创建存放原始 XML 的目录
          mkdir -p list/CN list/HK list/TW
          
          # 下载并解压到对应目录
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_cn.xml.gz" -o cn.gz && gunzip -c cn.gz > list/CN/epg.xml
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_hk.xml.gz" -o hk.gz && gunzip -c hk.gz > list/HK/epg.xml
          curl -Lfs "https://raw.githubusercontent.com/taksssss/tv/refs/heads/main/epg/epgpw_tw.xml.gz" -o tw.gz && gunzip -c tw.gz > list/TW/epg.xml

      - name: Run EPG Processor
        run: php epg.php

      - name: Deploy to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 这一步可以确保拉取最新的提交，防止冲突
          git pull origin main --rebase
          
          git add EPG/
          
          # 检查是否有文件变化
          if git diff --staged --quiet; then
            echo "没有发现数据变更，跳过提交。"
          else
            git commit -m "Auto Update EPG: $(date +'%Y-%m-%d %H:%M:%S')"
            # 使用默认令牌推送
            git push origin main
          fi
